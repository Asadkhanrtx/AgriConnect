name: CI - Notification Service

on:
  workflow_call:

env:
  AWS_REGION: ap-south-1
  SERVICE: notification
  CONTEXT: services/notification-service
  DOCKERFILE: services/notification-service/Dockerfile
  ECR_REPO: agriconnect-notification

jobs:
  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "full_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:${SHA}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: false
          load: true
          tags: ${{ steps.tag.outputs.full_image }}
          cache-from: type=gha,scope=${{ env.SERVICE }}
          cache-to: type=gha,mode=max,scope=${{ env.SERVICE }}

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tag.outputs.full_image }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Push to ECR
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO }}:latest
          cache-from: type=gha,scope=${{ env.SERVICE }}
