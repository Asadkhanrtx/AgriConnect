name: CI — Build, Scan & Push

on:
  push:
    branches: [eks-migration, main]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: asadoblivion

jobs:
  build-and-push:
    name: Build, Scan & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            dockerfile: services/auth-service/Dockerfile
            image: asadoblivion/agriconnect-auth
          - service: marketplace
            dockerfile: services/marketplace-service/Dockerfile
            image: asadoblivion/agriconnect-marketplace
          - service: order
            dockerfile: services/order-service/Dockerfile
            image: asadoblivion/agriconnect-order
          - service: media
            dockerfile: services/media-service/Dockerfile
            image: asadoblivion/agriconnect-media
          - service: notification
            dockerfile: services/notification-service/Dockerfile
            image: asadoblivion/agriconnect-notification

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHA}" >> $GITHUB_OUTPUT
          echo "full_tag=${{ matrix.image }}:${SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.tag.outputs.full_tag }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tag.outputs.full_tag }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Push image (SHA tag + latest)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.tag.outputs.full_tag }}
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
