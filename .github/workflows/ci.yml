name: CI — Build, Scan & Push

on:
  push:
    branches: [eks-migration, main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1

jobs:
  build-and-push:
    name: Build, Scan & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth
            dockerfile: services/auth-service/Dockerfile
            repo: agriconnect-auth
          - service: marketplace
            dockerfile: services/marketplace-service/Dockerfile
            repo: agriconnect-marketplace
          - service: order
            dockerfile: services/order-service/Dockerfile
            repo: agriconnect-order
          - service: media
            dockerfile: services/media-service/Dockerfile
            repo: agriconnect-media
          - service: notification
            dockerfile: services/notification-service/Dockerfile
            repo: agriconnect-notification

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "full_image=${{ steps.login-ecr.outputs.registry }}/${{ matrix.repo }}:${SHA}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.tag.outputs.full_image }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tag.outputs.full_image }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL

      - name: Push image (SHA tag + latest)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ steps.tag.outputs.full_image }}
            ${{ steps.login-ecr.outputs.registry }}/${{ matrix.repo }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
