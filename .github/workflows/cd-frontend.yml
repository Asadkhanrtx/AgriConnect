name: CD - Frontend

on:
  workflow_call:

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    name: Build & Deploy Frontend to S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BUYERBOT_API_URL: https://ugtdorb2be.execute-api.ap-south-1.amazonaws.com/chat
          VITE_FARMBOT_API_URL: https://oqpjllka0d.execute-api.ap-south-1.amazonaws.com/chat
        run: npm run build

      - name: Upload to S3
        run: |
          BUCKET="agriconnect-frontend-$(aws sts get-caller-identity --query Account --output text)"
          aws s3 sync frontend/dist/ s3://$BUCKET/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E292KDRCS52H6T \
            --paths "/*"
