name: CD - Frontend

on:
  workflow_call:

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    name: Build & Deploy Frontend to S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Read bot API URLs from SSM
        run: |
          FARMBOT_URL=$(aws ssm get-parameter --name /agriconnect/farmbot-api-url --query Parameter.Value --output text)
          BUYERBOT_URL=$(aws ssm get-parameter --name /agriconnect/buyerbot-api-url --query Parameter.Value --output text)
          echo "VITE_FARMBOT_API_URL=${FARMBOT_URL}" >> $GITHUB_ENV
          echo "VITE_BUYERBOT_API_URL=${BUYERBOT_URL}" >> $GITHUB_ENV
          echo "FarmBot URL: ${FARMBOT_URL}"
          echo "BuyerBot URL: ${BUYERBOT_URL}"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload to S3
        run: |
          BUCKET="agriconnect-frontend-$(aws sts get-caller-identity --query Account --output text)"
          aws s3 sync frontend/dist/ s3://$BUCKET/ --delete

      - name: Invalidate CloudFront cache
        run: |
          CF_ID=$(aws ssm get-parameter --name /agriconnect/cloudfront-distribution-id --query Parameter.Value --output text)
          aws cloudfront create-invalidation --distribution-id $CF_ID --paths "/*"
          echo "Invalidated CloudFront distribution: $CF_ID"
